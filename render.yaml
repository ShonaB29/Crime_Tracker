services:
  - type: web
    name: crimetracker-ai
    runtime: node
    plan: free
    buildCommand: npm install && (mkdir -p node_modules/rolldown && cp -f node_modules/@rolldown/binding-linux-x64-gnu/*.node node_modules/rolldown/ 2>/dev/null || true) && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
